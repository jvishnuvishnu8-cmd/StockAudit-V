<index.html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>StockAudit V - Pro System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --pri: #2d1b69; --acc: #00b4d8; --bg: #f0eaff; --card: #fff;
            --border: #d4c5f9; --ok: #0f6e56; --danger: #c0392b; --row-h: 50px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1a0533; overflow: hidden; }

        /* SIDEBAR & NAV */
        .sidebar { width: 240px; position: fixed; height: 100vh; background: linear-gradient(180deg, var(--pri), #1a0533); color: #fff; padding: 20px; z-index: 100; }
        .main { margin-left: 240px; height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: #fff; padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* VIRTUAL SCROLL ENGINE */
        #viewport { flex: 1; overflow-y: auto; position: relative; background: #fff; }
        #spacer { position: absolute; top: 0; left: 0; width: 1px; }
        #content-bundle { position: absolute; top: 0; left: 0; width: 100%; will-change: transform; }

        /* TABLE ROWS */
        .v-row { height: var(--row-h); display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 0 20px; }
        .v-col { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; }
        .v-col.wide { flex: 2; }
        .hdr { background: var(--pri); color: #fff; display: flex; padding: 12px 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* INPUTS & BUTTONS */
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 11px; }
        .btn-pri { background: var(--pri); color: #fff; }
        .btn-ok { background: var(--ok); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .sbox { width: 100%; padding: 10px 15px; border: 1px solid var(--border); border-radius: 20px; outline: none; margin-bottom: 10px; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .b-sub { background: #e1f5ee; color: var(--ok); }

        /* MODALS */
        .modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; padding: 30px; border-radius: 15px; width: 380px; }
        .view-section { display: none; height: 100%; flex-direction: column; }
        .active-view { display: flex; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginWrap" class="modal-ov">
    <div class="modal" style="text-align:center">
        <h2 style="color:var(--pri)">StockAudit V</h2>
        <p style="font-size:12px; color:#888; margin-bottom:20px">Unified Audit System</p>
        <input type="text" id="uInp" class="sbox" placeholder="Username">
        <input type="password" id="pInp" class="sbox" placeholder="Password">
        <button class="btn btn-pri" style="width:100%; padding:12px; border-radius:25px" onclick="doLogin()">Login</button>
        <p id="loginErr" style="color:red; margin-top:10px; font-size:12px"></p>
    </div>
</div>

<div id="appWrap" class="hidden" style="display:flex">
    <div class="sidebar">
        <h2>StockAudit V</h2>
        <p id="roleBadge" style="font-size:10px; opacity:0.6; margin-bottom:30px">PANEL</p>
        <div style="cursor:pointer; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1)" onclick="go('stock')">📦 Inventory Data</div>
        <div style="cursor:pointer; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1)" onclick="go('users')">👥 Attendance & Users</div>
        <div style="cursor:pointer; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1)" onclick="go('logs')">📜 Audit Trail (Logs)</div>
        <div style="position:absolute; bottom:30px; width:200px">
            <button class="btn btn-danger" style="width:100%" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h3 id="viewTitle">Inventory Data</h3>
            <div id="userBadge" style="font-size:12px; font-weight:bold; color:var(--pri)"></div>
        </div>

        <div id="stockView" class="view-section active-view">
            <div style="padding:0 25px">
                <input type="text" class="sbox" placeholder="Search Material Code..." oninput="handleSearch(this.value)">
            </div>
            <div class="hdr">
                <div class="v-col">Material</div>
                <div class="v-col wide">Description</div>
                <div class="v-col">Sys Qty</div>
                <div class="v-col">Phy Qty</div>
                <div class="v-col">Var.</div>
                <div class="v-col">Status</div>
                <div class="v-col">Action</div>
            </div>
            <div id="viewport">
                <div id="spacer"></div>
                <div id="content-bundle"></div>
            </div>
        </div>

        <div id="usersView" class="view-section" style="padding:25px; overflow-y:auto">
            <button class="btn btn-pri" style="margin-bottom:15px" onclick="newUser()">+ Add Auditor</button>
            <div id="userList"></div>
        </div>

        <div id="logsView" class="view-section" style="padding:25px; overflow-y:auto">
            <div id="logList"></div>
        </div>
    </div>
</div>

<script>
// --- DATA INITIALIZATION ---
let STOCK = JSON.parse(localStorage.getItem('audit_stock')) || [];
let USERS = JSON.parse(localStorage.getItem('audit_users')) || [
    {id:1, name:'Admin Master', user:'Vishnu27', pass:'Vishnu@27', role:'master', active:true, att:[]}
];
let LOGS = JSON.parse(localStorage.getItem('audit_logs')) || [];
let CU = null; 
let VIEW_DATA = [...STOCK];

// Example Data (If empty)
if(STOCK.length === 0) {
    for(let i=1; i<=500; i++) {
        STOCK.push({id:i, mat:'MAT-'+i, desc:'Material Item '+i, sysQty: 150, phyQty:null, status:'Pending', aud:''});
    }
}

// --- VIRTUAL SCROLLING ---
const viewport = document.getElementById('viewport');
const spacer = document.getElementById('spacer');
const bundle = document.getElementById('content-bundle');
const ROW_H = 50;

function render() {
    if(document.getElementById('stockView').style.display === 'none') return;
    const scrollTop = viewport.scrollTop;
    const startIdx = Math.floor(scrollTop / ROW_H);
    const endIdx = Math.min(startIdx + Math.ceil(viewport.offsetHeight / ROW_H) + 5, VIEW_DATA.length);

    spacer.style.height = (VIEW_DATA.length * ROW_H) + "px";
    bundle.style.transform = `translateY(${startIdx * ROW_H}px)`;

    let h = "";
    for(let i = startIdx; i < endIdx; i++) {
        const s = VIEW_DATA[i];
        const isSub = s.status === 'Submitted';
        const v = s.phyQty === null ? '—' : (s.phyQty - s.sysQty);
        h += `<div class="v-row">
            <div class="v-col"><b>${s.mat || '—'}</b></div>
            <div class="v-col wide">${s.desc || '—'}</div>
            <div class="v-col">${s.sysQty || 0}</div>
            <div class="v-col"><input type="number" value="${s.phyQty ?? ''}" style="width:70px" ${isSub && CU.role !== 'master' ? 'disabled' : ''} onchange="updateQty(${s.id},this.value)"></div>
            <div class="v-col" style="color:${v < 0 ? 'red' : 'green'}">${v}</div>
            <div class="v-col"><span class="badge ${isSub?'b-sub':''}">${s.status}</span></div>
            <div class="v-col">
                ${isSub ? 
                `<button class="btn btn-pri" onclick="reedit(${s.id})">Re-Edit</button>` : 
                `<button class="btn btn-ok" onclick="submitRow(${s.id})">Submit</button>`}
            </div>
        </div>`;
    }
    bundle.innerHTML = h;
}

// --- LOGIC & SECURITY ---
function doLogin() {
    const u = document.getElementById('uInp').value, p = document.getElementById('pInp').value;
    const user = USERS.find(x => x.user === u && x.pass === p);
    if(user && user.active) {
        CU = user;
        const today = new Date().toLocaleDateString();
        if(!user.att.includes(today)) user.att.push(today);
        save();
        document.getElementById('loginWrap').classList.add('hidden');
        document.getElementById('appWrap').classList.remove('hidden');
        document.getElementById('userBadge').innerText = CU.name;
        document.getElementById('roleBadge').innerText = CU.role.toUpperCase() + " ACCESS";
        render();
    } else { document.getElementById('loginErr').innerText = "Account Inactive or Invalid Credentials"; }
}

function go(view) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
    document.getElementById(view + 'View').classList.add('active-view');
    document.getElementById('viewTitle').innerText = view.toUpperCase();
    if(view === 'stock') render();
    if(view === 'users') renderUsers();
    if(view === 'logs') renderLogs();
}

function updateQty(id, v) { 
    const item = STOCK.find(x => x.id === id);
    item.phyQty = parseFloat(v);
    save();
}

function submitRow(id) {
    const item = STOCK.find(x => x.id === id);
    if(item.phyQty === null) return alert("Physical Qty Required");
    item.status = 'Submitted';
    save(); render();
}

function reedit(id) {
    const reason = prompt("Master Log: Why is this being re-edited?");
    if(reason) {
        const item = STOCK.find(x => x.id === id);
        LOGS.unshift({time: new Date().toLocaleString(), user: CU.name, mat: item.mat, reason: reason});
        item.status = 'Pending';
        save(); render();
    }
}

function handleSearch(val) {
    VIEW_DATA = STOCK.filter(x => (x.mat||'').toLowerCase().includes(val.toLowerCase()));
    viewport.scrollTop = 0;
    render();
}

function renderUsers() {
    if(CU.role !== 'master') { document.getElementById('userList').innerHTML = "Access Denied."; return; }
    document.getElementById('userList').innerHTML = USERS.filter(u => u.role !== 'master').map(u => `
        <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd; display:flex; justify-content:space-between">
            <div>
                <b>${u.name}</b> (Attendance Today: ${u.att.includes(new Date().toLocaleDateString()) ? '✅' : '❌'})<br>
                <small>Set Login: <input placeholder="User" value="${u.user}" onchange="uUser(${u.id},this.value)"> | <input placeholder="Pass" value="${u.pass}" onchange="uPass(${u.id},this.value)"></small>
            </div>
            <button class="btn ${u.active?'btn-ok':'btn-danger'}" onclick="toggleUser(${u.id})">${u.active?'ENABLED':'DISABLED'}</button>
        </div>
    `).join('');
}

function renderLogs() {
    document.getElementById('logList').innerHTML = LOGS.map(l => `
        <div style="padding:10px; border-left:4px solid var(--acc); background:#fff; margin-bottom:8px; font-size:12px">
            <b>${l.time}</b> | Auditor: ${l.user} | Material: ${l.mat}<br>
            <span>Reason: ${l.reason}</span>
        </div>
    `).join('') || 'No edit logs available.';
}

function newUser() {
    const n = prompt("Auditor Name:");
    if(n) { USERS.push({id:Date.now(), name:n, user:'', pass:'', role:'auditor', active:true, att:[]}); save(); renderUsers(); }
}

function toggleUser(id) { const u = USERS.find(x => x.id===id); u.active = !u.active; save(); renderUsers(); }
function uUser(id, v) { USERS.find(x => x.id===id).user = v; save(); }
function uPass(id, v) { USERS.find(x => x.id===id).pass = v; save(); }
function save() { 
    localStorage.setItem('audit_stock', JSON.stringify(STOCK));
    localStorage.setItem('audit_users', JSON.stringify(USERS));
    localStorage.setItem('audit_logs', JSON.stringify(LOGS));
}

viewport.addEventListener('scroll', render);
</script>
</body>
</html>
